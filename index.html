<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Bibliothèque – Ensemble vers la lumière</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- Firebase (Auth seulement) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script>
    // 🔁 REMPLACEZ CES XXXXX PAR VOS VRAIES VALEURS
    const firebaseConfig = {
      apiKey: "XXXXX",
      authDomain: "XXXXX",
      projectId: "XXXXX",
      storageBucket: "XXXXX",
      messagingSenderId: "XXXXX",
      appId: "XXXXX"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
  </script>
  <style>
    /* Tous vos styles restent identiques (je ne les recopie pas pour gagner de la place, mais vous devez les laisser) */
    /* ... (vos styles existants) ... */
  </style>
</head>
<body>
  <!-- Tout votre HTML reste identique jusqu'à la section AUTH -->
  <!-- ... (votre code HTML existant) ... -->

  <!-- AUTH SECTION (simplifiée) -->
  <div id="auth" class="auth-section">
    <section style="max-width: 500px; margin: 0 auto;">
      <div id="nonConnecte">
        <div class="section-label">Espace membre</div>
        <h2><span id="formTitle">Inscription</span></h2>
        <div id="inscriptionForm">
          <form id="inscription-form">
            <div style="display: flex; gap: 1rem;">
              <input type="text" id="nom" placeholder="Nom" required>
              <input type="text" id="prenom" placeholder="Prénom" required>
            </div>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <input type="password" id="confirm-password" placeholder="Confirmer mot de passe" required>
            <button type="button" id="create-btn">CRÉATEUR</button>
          </form>
        </div>
        <div id="connexionForm" style="display: none;">
          <form id="login-form">
            <input type="email" id="login-email" placeholder="E-mail" required>
            <input type="password" id="login-password" placeholder="Mot de passe" required>
            <button type="button" id="login-btn">SE CONNECTER</button>
          </form>
        </div>
        <span class="toggle-link" id="toggleForm">Déjà un compte ? Connectez-vous</span>
      </div>

      <div id="connecte" style="display: none;">
        <div class="member-section">
          <h3>Bienvenue dans votre espace</h3>
          <p id="welcomeMessage"></p>
          <button id="logout-btn">SE DÉCONNECTER</button>
        </div>
      </div>
    </section>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>Ma Bibliothèque</span> · Communauté numérique d'apprentissage collaboratif<br>
    <small>« Ensemble sortons des ténèbres de l'ignorance vers la lumière parfaite de la science »</small>
  </footer>

  <!-- SCRIPTS simplifiés -->
  <script>
    // Intersection Observer (optionnel, à garder si vous voulez)
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.opacity = '1';
          e.target.style.transform = 'translateY(0)';
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.espace-card, .act-item, .mission-item, .valeur-pill, .public-tag, .contact-link').forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(20px)';
      el.style.transition = 'opacity .6s ease, transform .6s ease, border-color .3s, background .3s, color .3s';
      observer.observe(el);
    });

    // Éléments DOM pour l'authentification
    const nonConnecte = document.getElementById('nonConnecte');
    const connecte = document.getElementById('connecte');
    const inscriptionForm = document.getElementById('inscriptionForm');
    const connexionForm = document.getElementById('connexionForm');
    const toggleLink = document.getElementById('toggleForm');
    const formTitle = document.getElementById('formTitle');
    const welcomeMsg = document.getElementById('welcomeMessage');

    let isInscription = true;
    toggleLink.addEventListener('click', () => {
      isInscription = !isInscription;
      if (isInscription) {
        formTitle.textContent = 'Inscription';
        inscriptionForm.style.display = 'block';
        connexionForm.style.display = 'none';
        toggleLink.textContent = 'Déjà un compte ? Connectez-vous';
      } else {
        formTitle.textContent = 'Connexion';
        inscriptionForm.style.display = 'none';
        connexionForm.style.display = 'block';
        toggleLink.textContent = 'Pas encore de compte ? Inscrivez-vous';
      }
    });

    // Observer l'état de connexion
    auth.onAuthStateChanged((user) => {
      if (user) {
        nonConnecte.style.display = 'none';
        connecte.style.display = 'block';
        // On ne peut pas récupérer nom/prénom sans Firestore, on affiche juste l'email
        welcomeMsg.textContent = `Bonjour ${user.email} ! Vous êtes connecté.`;
      } else {
        nonConnecte.style.display = 'block';
        connecte.style.display = 'none';
      }
    });

    // Inscription
    document.getElementById('create-btn').addEventListener('click', function() {
      const nom = document.getElementById('nom').value.trim();
      const prenom = document.getElementById('prenom').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!nom || !prenom || !email || !password || !confirm) {
        alert('Veuillez remplir tous les champs.');
        return;
      }
      if (password !== confirm) {
        alert('Les mots de passe ne correspondent pas.');
        return;
      }
      if (password.length < 6) {
        alert('Le mot de passe doit contenir au moins 6 caractères.');
        return;
      }

      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          alert('Inscription réussie ! Bienvenue ' + prenom + ' ' + nom + ' !');
          // Ici, on ne sauvegarde pas nom/prénom dans Firestore, donc ils ne seront pas conservés
        })
        .catch((error) => {
          alert('Erreur : ' + error.message);
        });
    });

    // Connexion
    document.getElementById('login-btn').addEventListener('click', function() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        alert('Veuillez remplir tous les champs.');
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert('Connexion réussie !');
        })
        .catch((error) => {
          alert('Erreur : ' + error.message);
        });
    });

    // Déconnexion
    document.getElementById('logout-btn').addEventListener('click', function() {
      auth.signOut()
        .then(() => {
          alert('Vous êtes déconnecté.');
        })
        .catch((error) => {
          alert('Erreur : ' + error.message);
        });
    });
  </script>
</body>
</html>
